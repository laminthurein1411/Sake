name: Publish Prebuilt Docker Image

on:
  push:
    tags:
      - 'webapp/v*'
  workflow_dispatch:
    inputs:
      git_tag:
        description: Existing webapp release tag to publish, for example webapp/v2026.03.28.2
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-prebuilt-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          repository="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          git_tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            git_tag="${{ github.event.inputs.git_tag }}"
          fi

          version="${git_tag#webapp/v}"
          released_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          commit_sha="$(git rev-list -n 1 "$git_tag")"
          short_sha="${commit_sha::12}"

          {
            echo "name=ghcr.io/${repository}"
            echo "version=${version}"
            echo "git_tag=${git_tag}"
            echo "released_at=${released_at}"
            echo "short_sha=${short_sha}"
            echo "commit_sha=${commit_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=Sake
            org.opencontainers.image.description=Personal reading stack with a Svelte web app and KOReader plugin sync
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
            org.opencontainers.image.revision=${{ steps.image.outputs.commit_sha }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.image.outputs.version }}
            type=raw,value=sha-${{ steps.image.outputs.short_sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./sake/dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PUBLIC_WEBAPP_VERSION=${{ steps.image.outputs.version }}
            PUBLIC_WEBAPP_GIT_TAG=${{ steps.image.outputs.git_tag }}
            PUBLIC_WEBAPP_COMMIT_SHA=${{ steps.image.outputs.commit_sha }}
            PUBLIC_WEBAPP_RELEASED_AT=${{ steps.image.outputs.released_at }}
